<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crown Tag — Offline Arena</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a20; }
      #app { width: 100%; height: 100%; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
        color: #e8e8ef;
        text-shadow: 0 1px 2px #000;
      }
      #hud-top {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 14px;
        line-height: 1.55;
      }
      #hud-top .dim { color: #9a9aa8; }
      #hud-top b { color: #f5c542; font-weight: 600; }
      #hint {
        position: absolute;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        padding: 10px 16px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 13px;
        letter-spacing: 0.02em;
        text-align: center;
      }
      #hint.hidden { display: none; }
      #controls {
        position: absolute;
        right: 16px;
        bottom: 16px;
        font-size: 12px;
        color: #9a9aa8;
        text-align: right;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="hud-top">
        <div><span class="dim">holder</span> <b id="holder">—</b></div>
        <div><span class="dim">score</span> <span id="score">0.0</span></div>
      </div>
      <div id="hint">Click to capture mouse · WASD move · Shift sprint · Space jump · Click hit · R reset</div>
      <div id="controls">
        Offline arena<br />
        Claim by proximity · Steal with Hit
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
