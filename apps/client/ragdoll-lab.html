<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ragdoll Lab</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a20; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
        color: #e8e8ef;
        text-shadow: 0 1px 2px #000;
      }
      #title {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #f5c542;
      }
      #hint {
        position: absolute;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        padding: 10px 16px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 13px;
        letter-spacing: 0.02em;
        white-space: normal;
        max-width: 90vw;
        text-align: center;
        line-height: 1.45;
      }
      #controls {
        position: fixed;
        right: 16px;
        bottom: 28px;
        z-index: 10;
        pointer-events: auto;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
        max-width: 560px;
      }
      #controls button,
      #controls label {
        padding: 10px 14px;
        font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
        font-size: 13px;
        background: #f5c542;
        color: #1a1a20;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      #controls button:hover { filter: brightness(1.05); }
      #controls button.secondary { background: #6b8cff; color: #fff; }
      #controls label.debug {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.12);
        color: #e8e8ef;
        font-weight: 500;
        user-select: none;
      }
      #controls label.debug input { accent-color: #f5c542; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="title">Ragdoll Lab</div>
      <div id="hint">Idle — use Stand / Tumble / Get up / Knockdown</div>
    </div>
    <div id="controls">
      <label class="debug"><input type="checkbox" id="debugToggle" checked /> Debug</label>
      <button id="standBtn" type="button">Stand</button>
      <button id="tumbleBtn" type="button">Tumble</button>
      <button id="getUpBtn" type="button">Get up</button>
      <button id="replayBtn" type="button" class="secondary">Replay</button>
      <button id="knockdownBtn" type="button">Knockdown+recover</button>
      <button id="idleBtn" type="button" class="secondary">Idle clip</button>
    </div>
    <script type="module" src="/src/ragdollLab.ts"></script>
  </body>
</html>
